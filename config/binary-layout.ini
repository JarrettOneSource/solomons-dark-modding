[background_focus.hooks]
game_window_proc=0x00443440
; MyApp per-frame tick (FUN_0040d3c0). Reads the app-deactivated flag at +0xc25
; and, when set, skips the fixed-step simulation catch-up loop (freezing the sim
; while the window is backgrounded). The loader hooks this to force +0xc25=0 so
; both multiplayer instances keep simulating regardless of OS window focus.
app_main_tick=0x0040d3c0

[background_focus.globals]
window_input_scale_x=0x00818678
window_input_scale_y=0x0081867C

[gameplay.hooks]
; CPU::Tick immediately after the virtual per-object update returns. The stock
; function otherwise continues into the object's child manager even when that
; update has just marked the object for removal at +0x05.
